<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="536" viewBox="0 0 680 536" font-family="Helvetica, Arial, sans-serif">
  <title>Il residual stream come canale additivo e l'estrazione per layer</title>
  <desc>Il residual stream dell'ultimo token parte dall'embedding in basso e cresce verso l'alto. A ogni layer un aggiornamento additivo scrive il proprio contributo nel canale; lo stato risultante a ciascuna profondita viene prelevato e inviato a un probe indipendente. Su 32 layer si ottengono 32 probe.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="180" y1="96" x2="180" y2="66" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="78" font-size="12" font-weight="400" fill="#5F5E5A">verso la generazione</text>

  <!-- residual stream channel -->
  <rect x="160" y="96" width="40" height="300" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>

  <!-- Layer 31 row -->
  <rect x="40" y="107" width="104" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="92" y="134" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Layer 31</text>
  <line x1="144" y1="130" x2="167" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="180" cy="130" r="11" fill="#378ADD"/>
  <text x="180" y="135" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">+</text>
  <line x1="200" y1="130" x2="378" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="107" width="200" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="128" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Probe MLP</text>
  <text x="480" y="146" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">layer 31</text>

  <!-- ellipsis 1 -->
  <circle cx="92" cy="182" r="2" fill="#888780"/><circle cx="92" cy="188" r="2" fill="#888780"/><circle cx="92" cy="194" r="2" fill="#888780"/>
  <circle cx="180" cy="182" r="2" fill="#888780"/><circle cx="180" cy="188" r="2" fill="#888780"/><circle cx="180" cy="194" r="2" fill="#888780"/>
  <circle cx="480" cy="182" r="2" fill="#888780"/><circle cx="480" cy="188" r="2" fill="#888780"/><circle cx="480" cy="194" r="2" fill="#888780"/>

  <!-- Layer i row -->
  <rect x="40" y="223" width="104" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="92" y="250" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Layer i</text>
  <line x1="144" y1="246" x2="167" y2="246" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="180" cy="246" r="11" fill="#378ADD"/>
  <text x="180" y="251" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">+</text>
  <line x1="200" y1="246" x2="378" y2="246" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="223" width="200" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Probe MLP</text>
  <text x="480" y="262" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">layer i</text>

  <!-- ellipsis 2 -->
  <circle cx="92" cy="298" r="2" fill="#888780"/><circle cx="92" cy="304" r="2" fill="#888780"/><circle cx="92" cy="310" r="2" fill="#888780"/>
  <circle cx="180" cy="298" r="2" fill="#888780"/><circle cx="180" cy="304" r="2" fill="#888780"/><circle cx="180" cy="310" r="2" fill="#888780"/>
  <circle cx="480" cy="298" r="2" fill="#888780"/><circle cx="480" cy="304" r="2" fill="#888780"/><circle cx="480" cy="310" r="2" fill="#888780"/>

  <!-- Layer 0 row -->
  <rect x="40" y="339" width="104" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="92" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Layer 0</text>
  <line x1="144" y1="362" x2="167" y2="362" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="180" cy="362" r="11" fill="#378ADD"/>
  <text x="180" y="367" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">+</text>
  <line x1="200" y1="362" x2="378" y2="362" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="339" width="200" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="360" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Probe MLP</text>
  <text x="480" y="378" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">layer 0</text>

  <!-- embedding -->
  <line x1="180" y1="406" x2="180" y2="398" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="120" y="406" width="120" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="180" y="427" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Embedding</text>
  <text x="180" y="445" text-anchor="middle" font-size="12" font-weight="400" fill="#5F5E5A">ultimo token</text>

  <!-- legend -->
  <rect x="60" y="480" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="78" y="490" font-size="12" font-weight="400" fill="#5F5E5A">residual stream</text>
  <rect x="210" y="480" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="228" y="490" font-size="12" font-weight="400" fill="#5F5E5A">layer</text>
  <rect x="300" y="480" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="318" y="490" font-size="12" font-weight="400" fill="#5F5E5A">probe (32, uno per layer)</text>

  <text x="60" y="514" font-size="12" font-weight="400" fill="#5F5E5A">+ : aggiornamento additivo con cui ciascun layer scrive il proprio contributo (dim. 4096)</text>
</svg>
