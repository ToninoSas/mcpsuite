<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="516" viewBox="0 0 680 516" font-family="Helvetica, Arial, sans-serif">
  <title>Pipeline metodologica: dal dataset BFCL all'addestramento dei probe</title>
  <desc>Fase 1, inferenza ed estrazione: dal prompt BFCL il modello produce in parallelo il residual stream dell'ultimo token e la chiamata generata. Fase 2, etichettatura e addestramento: la chiamata viene confrontata con la ground truth tramite AST per ricavare l'etichetta; residual stream ed etichetta alimentano l'addestramento di 32 probe MLP.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- L1 Prompt BFCL -->
  <rect x="60" y="58" width="210" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="165" y="84" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Prompt BFCL</text>
  <text x="165" y="102" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">richiesta + schemi tool</text>
  <line x1="165" y1="114" x2="165" y2="144" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L2 Modello -->
  <rect x="60" y="146" width="210" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="165" y="172" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Modello (Qwen / Llama)</text>
  <text x="165" y="190" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">inferenza nel prefill</text>
  <line x1="165" y1="202" x2="165" y2="234" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="174" x2="358" y2="174" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L3 Residual stream -->
  <rect x="60" y="234" width="210" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="165" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Residual stream</text>
  <text x="165" y="278" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">ultimo token &#183; 32 &#215; 4096</text>
  <line x1="165" y1="290" x2="165" y2="408" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B1 Chiamata generata -->
  <rect x="360" y="146" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="480" y="172" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Chiamata generata</text>
  <text x="480" y="190" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">tool call prodotta</text>
  <line x1="480" y1="202" x2="480" y2="234" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B2 Confronto AST -->
  <rect x="360" y="234" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Confronto AST</text>
  <text x="480" y="278" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">vs ground truth (BFCL)</text>
  <line x1="480" y1="290" x2="480" y2="322" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B3 Etichetta -->
  <rect x="360" y="322" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="348" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Etichetta 0 / 1</text>
  <text x="480" y="366" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">corretta / allucinazione</text>
  <path d="M480 378 V438 H276" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L4 32 probe MLP -->
  <rect x="60" y="410" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="165" y="436" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">32 probe MLP</text>
  <text x="165" y="454" text-anchor="middle" font-size="12" font-weight="400" fill="#0F6E56">uno per layer (addestrati)</text>

  <!-- legend -->
  <rect x="60" y="486" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="78" y="496" font-size="12" font-weight="400" fill="#5F5E5A">Fase 1 &#8212; inferenza ed estrazione</text>
  <rect x="330" y="486" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="348" y="496" font-size="12" font-weight="400" fill="#5F5E5A">Fase 2 &#8212; etichettatura e addestramento</text>
</svg>
