<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="432" viewBox="0 0 680 432" font-family="Helvetica, Arial, sans-serif">
  <title>Prefill contro decoding: dove avviene la detection delle allucinazioni</title>
  <desc>A sinistra la fase di prefill, in cui il modello elabora l'intero prompt in un solo passaggio e dal residual stream dell'ultimo token un probe predice l'allucinazione prima della generazione. A destra la fase di decoding, in cui la chiamata viene generata token per token e la detection di Healy et al. legge la chiamata gia prodotta.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- divider label -->
  <text x="350" y="42" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">primo token di risposta</text>

  <!-- phase containers -->
  <rect x="40" y="58" width="290" height="326" rx="14" fill="none" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 4"/>
  <rect x="370" y="58" width="270" height="326" rx="14" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="350" y1="58" x2="350" y2="384" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 4"/>

  <text x="185" y="86" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Fase di prefill</text>
  <text x="505" y="86" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Fase di decoding</text>

  <!-- LEFT: prefill -->
  <rect x="62" y="100" width="246" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="185" y="124" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Prompt iniziale</text>
  <text x="185" y="140" text-anchor="middle" font-size="12" font-weight="400" fill="#5F5E5A">richiesta utente + schemi tool</text>
  <line x1="185" y1="150" x2="185" y2="166" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="62" y="168" width="246" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="185" y="192" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Prefill</text>
  <text x="185" y="208" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">un solo passaggio in avanti</text>
  <line x1="185" y1="218" x2="185" y2="234" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="62" y="236" width="246" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="185" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Ultimo token del prompt</text>
  <text x="185" y="276" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">residual stream &#183; dim. 4096</text>
  <line x1="185" y1="286" x2="185" y2="302" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="62" y="304" width="246" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="185" y="328" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Probe &#8212; questo lavoro</text>
  <text x="185" y="344" text-anchor="middle" font-size="12" font-weight="400" fill="#185FA5">prevenzione: errore evitabile</text>

  <!-- RIGHT: decoding -->
  <rect x="388" y="100" width="234" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="505" y="124" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Decoding</text>
  <text x="505" y="140" text-anchor="middle" font-size="12" font-weight="400" fill="#854F0B">generazione token per token</text>
  <line x1="505" y1="150" x2="505" y2="166" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="388" y="168" width="234" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="505" y="192" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Chiamata generata</text>
  <text x="505" y="208" text-anchor="middle" font-size="12" font-weight="400" fill="#854F0B">es. get_meteo(citt&#224;=&#8230;)</text>
  <line x1="505" y1="218" x2="505" y2="234" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="388" y="236" width="234" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="505" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Estrazione dai token</text>
  <text x="505" y="276" text-anchor="middle" font-size="12" font-weight="400" fill="#854F0B">nome &#183; argomenti &#183; chiusura</text>
  <line x1="505" y1="286" x2="505" y2="302" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="388" y="304" width="234" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="505" y="328" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Detection &#8212; Healy et al.</text>
  <text x="505" y="344" text-anchor="middle" font-size="12" font-weight="400" fill="#854F0B">diagnosi: errore gi&#224; emesso</text>

  <!-- legend -->
  <rect x="60" y="398" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="78" y="408" font-size="12" font-weight="400" fill="#5F5E5A">Questo lavoro &#8212; detection nel prefill</text>
  <rect x="372" y="398" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="390" y="408" font-size="12" font-weight="400" fill="#5F5E5A">Healy et al. &#8212; detection nel decoding</text>
</svg>
